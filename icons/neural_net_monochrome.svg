<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="500" height="600" xmlns="http://www.w3.org/2000/svg">

  <!-- Background rounded rectangles for each layer -->
  <rect x="20" y="20" width="80" height="560" rx="40" fill="#e8e8e8" stroke="#000000" stroke-width="1.5"/>
  <rect x="150" y="80" width="80" height="440" rx="40" fill="#e8e8e8" stroke="#000000" stroke-width="1.5"/>
  <rect x="280" y="80" width="80" height="440" rx="40" fill="#e8e8e8" stroke="#000000" stroke-width="1.5"/>
  <rect x="410" y="140" width="80" height="320" rx="40" fill="#e8e8e8" stroke="#000000" stroke-width="1.5"/>

  <!-- Layer 1 (4 nodes) -->
  <g id="layer1">
    <circle cx="60" cy="90" r="20" fill="#000000"/>
    <circle cx="60" cy="230" r="20" fill="#000000"/>
    <circle cx="60" cy="370" r="20" fill="#000000"/>
    <circle cx="60" cy="510" r="20" fill="#000000"/>
  </g>

  <!-- Connections from Layer 1 to Layer 2 -->
  <g id="connections-1-2" stroke="#000000" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="80" y1="90" x2="170" y2="150"/>
    <line x1="80" y1="90" x2="170" y2="290"/>
    <line x1="80" y1="90" x2="170" y2="430"/>
    <line x1="80" y1="230" x2="170" y2="150"/>
    <line x1="80" y1="230" x2="170" y2="290"/>
    <line x1="80" y1="230" x2="170" y2="430"/>
    <line x1="80" y1="370" x2="170" y2="150"/>
    <line x1="80" y1="370" x2="170" y2="290"/>
    <line x1="80" y1="370" x2="170" y2="430"/>
    <line x1="80" y1="510" x2="170" y2="150"/>
    <line x1="80" y1="510" x2="170" y2="290"/>
    <line x1="80" y1="510" x2="170" y2="430"/>
  </g>

  <!-- Layer 2 (3 nodes) -->
  <g id="layer2">
    <circle cx="190" cy="150" r="20" fill="#000000"/>
    <circle cx="190" cy="290" r="20" fill="#000000"/>
    <circle cx="190" cy="430" r="20" fill="#000000"/>
  </g>

  <!-- Connections from Layer 2 to Layer 3 -->
  <g id="connections-2-3" stroke="#000000" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="210" y1="150" x2="300" y2="150"/>
    <line x1="210" y1="150" x2="300" y2="290"/>
    <line x1="210" y1="150" x2="300" y2="430"/>
    <line x1="210" y1="290" x2="300" y2="150"/>
    <line x1="210" y1="290" x2="300" y2="290"/>
    <line x1="210" y1="290" x2="300" y2="430"/>
    <line x1="210" y1="430" x2="300" y2="150"/>
    <line x1="210" y1="430" x2="300" y2="290"/>
    <line x1="210" y1="430" x2="300" y2="430"/>
  </g>

  <!-- Layer 3 (3 nodes) -->
  <g id="layer3">
    <circle cx="320" cy="150" r="20" fill="#000000"/>
    <circle cx="320" cy="290" r="20" fill="#000000"/>
    <circle cx="320" cy="430" r="20" fill="#000000"/>
  </g>

  <!-- Connections from Layer 3 to Layer 4 -->
  <g id="connections-3-4" stroke="#000000" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="340" y1="150" x2="430" y2="210"/>
    <line x1="340" y1="150" x2="430" y2="310"/>
    <line x1="340" y1="150" x2="430" y2="410"/>
    <line x1="340" y1="290" x2="430" y2="210"/>
    <line x1="340" y1="290" x2="430" y2="310"/>
    <line x1="340" y1="290" x2="430" y2="410"/>
    <line x1="340" y1="430" x2="430" y2="210"/>
    <line x1="340" y1="430" x2="430" y2="310"/>
    <line x1="340" y1="430" x2="430" y2="410"/>
  </g>

  <!-- Layer 4 (3 nodes) -->
  <g id="layer4">
    <circle cx="450" cy="210" r="20" fill="#000000"/>
    <circle cx="450" cy="310" r="20" fill="#000000"/>
    <circle cx="450" cy="410" r="20" fill="#000000"/>
  </g>
</svg>