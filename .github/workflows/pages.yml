name: Render Quarto and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # FIX 1: Explicitly force output to '_site' folder
      - name: Render
        run: quarto render defense.qmd --to revealjs --output-dir _site

      # FIX 2: Simplified rename (we now know _site exists)
      - name: Rename defense to index
        run: mv _site/defense.html _site/index.html

      # FIX 3: Simplified .nojekyll creation
      - name: Disable Jekyll
        run: touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
