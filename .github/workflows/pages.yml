name: Render Quarto and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 1. Install R (Required if you have R code, remove if not)
      # - name: Setup R
      #   uses: r-lib/actions/setup-r@v2
      #   with:
      #     r-version: '4.4.0'
      # - name: Install R dependencies
      #   uses: r-lib/actions/setup-r-dependencies@v2
      #   with:
      #     packages: |
      #       any::knitr
      #       any::rmarkdown

      # 2. Render specifically to '_site'
      - name: Render Defense Slides
        # This forces the output to go to _site, ensuring the directory exists
        run: quarto render defense.qmd --to revealjs --output-dir _site

      # 3. Overwrite index.html with your slides
      - name: Make Defense the Homepage
        run: |
          echo "Files in _site before rename:"
          ls -R _site
          
          # Remove existing index.html (the demo file) if it exists
          rm -f _site/index.html
          
          # Rename your slides to index.html so they become the homepage
          mv _site/defense.html _site/index.html
          
          echo "Files in _site after rename:"
          ls -la _site

      # 4. Standard deployment steps
      - name: Disable Jekyll
        run: touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
